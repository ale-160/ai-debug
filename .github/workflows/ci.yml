name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      retry_count:
        description: 'Auto-fix retry count (internal use)'
        required: false
        default: '0'

env:
  MAX_AUTO_FIX_RETRIES: 3

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================
  # 安全检查：Pages Functions 防护 + 外部贡献者标记
  # - 检测 /functions/ 目录是否被新增（防恶意 Pages Functions 窃取预览部署 secrets）
  # - 标记外部贡献者 PR（仅信息记录，不跳过 CI，因为公共仓库 CI 免费）
  # ============================================================
  security-check:
    runs-on: ubuntu-latest
    outputs:
      is_external: ${{ steps.permission.outputs.is_external }}
      has_functions: ${{ steps.functions.outputs.has }}
    steps:
      - uses: actions/checkout@v5

      - name: Check author permission
        id: permission
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.pull_request.user.login,
            });
            if (perm.permission === 'none') {
              core.info('External contributor PR - will run full CI (public repo CI is free)');
              core.setOutput('is_external', 'true');
            } else {
              core.setOutput('is_external', 'false');
            }

      - name: Detect Pages Functions directory
        id: functions
        run: |
          if [ -d "functions" ] || find . -path ./node_modules -prune -o -name "functions" -type d -print | grep -q .; then
            echo "has=true" >> $GITHUB_OUTPUT
            echo "::error::检测到 /functions/ 目录，本项目是纯静态导出（output: export），不应包含 Pages Functions。请检查是否为恶意代码注入。"
            exit 1
          else
            echo "has=false" >> $GITHUB_OUTPUT
          fi

  quality:
    needs: security-check
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.result.outputs.status }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
      # 不指定 version，自动读 package.json 的 packageManager 字段

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --prod

      - name: Lint
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee /tmp/lint.log || echo "failed" > /tmp/lint_status
        continue-on-error: true

      - name: Format check
        run: |
          set -o pipefail
          pnpm format:check 2>&1 | tee /tmp/format.log || echo "failed" > /tmp/format_status
        continue-on-error: true

      - name: Type check
        run: |
          set -o pipefail
          pnpm type-check 2>&1 | tee /tmp/typecheck.log || echo "failed" > /tmp/typecheck_status
        continue-on-error: true

      - name: Test
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee /tmp/test.log || echo "failed" > /tmp/test_status
        continue-on-error: true

      - name: Build
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee /tmp/build.log || echo "failed" > /tmp/build_status
        continue-on-error: true

      - name: Collect results
        id: result
        if: always()
        run: |
          STATUS="success"
          mkdir -p /tmp/ci-logs
          if [ -f /tmp/lint_status ]; then
            STATUS="failed"
            cp /tmp/lint.log /tmp/ci-logs/lint.log
          fi
          if [ -f /tmp/format_status ]; then
            STATUS="failed"
            cp /tmp/format.log /tmp/ci-logs/format.log
          fi
          if [ -f /tmp/typecheck_status ]; then
            STATUS="failed"
            cp /tmp/typecheck.log /tmp/ci-logs/typecheck.log
          fi
          if [ -f /tmp/test_status ]; then
            STATUS="failed"
            cp /tmp/test.log /tmp/ci-logs/test.log
          fi
          if [ -f /tmp/build_status ]; then
            STATUS="failed"
            cp /tmp/build.log /tmp/ci-logs/build.log
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Upload CI logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-error-logs
          path: /tmp/ci-logs/
          retention-days: 7

  # ============================================================
  # PR 评论：CI 结果自动通知
  # - 仅 PR 事件触发
  # - 成功/失败都评论，失败时附错误摘要
  # - 部署由 Cloudflare Pages 的 GitHub 集成自动完成，无需 CI 推送
  # ============================================================
  pr-comment:
    needs: [security-check, quality]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download CI logs
        if: needs.quality.result == 'failure'
        uses: actions/download-artifact@v5
        with:
          name: ci-error-logs
          path: /tmp/ci-logs
        continue-on-error: true

      - name: Find existing comment
        if: always()
        id: find-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- ci-status-comment -->'

      - name: Generate PR comment
        id: comment
        if: always()
        # 4.11.3：上下文变量通过 env 传递，避免在 shell 脚本中直接插值 ${{ }}
        # 防御性编程：即使上下文变量含特殊字符（如 PR 标题含 $ / `），也不会
        # 触发 shell 注入或 GitHub Actions 表达式注入。
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          SEC_CHECK_RESULT: ${{ needs.security-check.result }}
          IS_EXTERNAL: ${{ needs.security-check.outputs.is_external }}
          COMMENT_ID: ${{ steps.find-comment.outputs.comment-id }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          STATUS="$QUALITY_RESULT"
          SEC_STATUS="$SEC_CHECK_RESULT"
          IS_EXTERNAL="$IS_EXTERNAL"
          MAX_RETRIES=3

          RETRY_COUNT=0
          if [ -n "$COMMENT_ID" ]; then
            if command -v gh &> /dev/null; then
              COMMENT_BODY=$(gh api "/repos/$GH_REPO/issues/comments/$COMMENT_ID" --jq '.body' 2>/dev/null || echo "")
              if echo "$COMMENT_BODY" | grep -q "auto-fix-retry-count:"; then
                RETRY_COUNT=$(echo "$COMMENT_BODY" | grep -o "auto-fix-retry-count: [0-9]*" | grep -o "[0-9]*")
              fi
            fi
          fi

          if [ "$STATUS" != "success" ]; then
            RETRY_COUNT=$((RETRY_COUNT + 1))
          else
            RETRY_COUNT=0
          fi

          # 4.11.4：辅助函数 - 把日志内容做 markdown escape 后以 4 空格缩进
          # 形式输出（markdown 缩进代码块）。相比 fenced code block（```），
          # 缩进代码块不会被日志中可能存在的 ``` 字符提前闭合，避免内容逃逸
          # 出代码块造成 markdown 注入 / 排版错乱。
          emit_log_block() {
            local label="$1"
            local log_file="$2"
            local tail_lines="$3"
            if [ -f "$log_file" ]; then
              echo "$label"
              echo ""
              # 用 sed 给每行加 4 空格前缀，转为 markdown 缩进代码块
              if [ -n "$tail_lines" ]; then
                tail -n "$tail_lines" "$log_file" | sed 's/^/    /'
              else
                cat "$log_file" | sed 's/^/    /'
              fi
              echo ""
            fi
          }

          # 4.11.4：typecheck 专用块（grep 过滤 error 行 + 4 空格缩进）
          emit_typecheck_block() {
            if [ -f /tmp/ci-logs/typecheck.log ]; then
              echo "### 🔴 Type Check 错误"
              echo ""
              grep -E 'error TS[0-9]+:' /tmp/ci-logs/typecheck.log | head -30 | sed 's/^/    /'
              echo ""
            fi
          }

          {
            echo 'body<<COMMENT_EOF'
            if [ "$SEC_STATUS" = "failure" ]; then
              echo "## 🔒 安全检查失败"
              echo ""
              echo "检测到潜在安全风险（如 /functions/ 目录注入），CI 已中止。"
              echo "请检查 PR 中是否包含 Pages Functions 代码，本项目是纯静态导出不应有 Functions。"
            elif [ "$STATUS" = "success" ]; then
              if [ "$IS_EXTERNAL" = "true" ]; then
                echo "## ✅ CI 通过（外部贡献者）"
              else
                echo "## ✅ CI 通过"
              fi
              echo ""
              echo "所有检查项均已通过，可以进行代码审查。"
            else
              echo "## ❌ CI 失败"
              echo ""
              if [ "$RETRY_COUNT" -le "$MAX_RETRIES" ]; then
                echo "> 🔄 自动修复中... 第 ${RETRY_COUNT}/${MAX_RETRIES} 次尝试"
                echo ""
              else
                echo "> ⛔ 已达到最大自动修复次数 (${MAX_RETRIES})，请人工介入"
                echo ""
              fi
              # 4.11.4：日志块改用 emit_log_block / emit_typecheck_block 输出
              # （4 空格缩进代码块），避免日志中含 ``` 字符时逃逸出 fenced code block
              emit_typecheck_block
              emit_log_block "### 🟡 Lint 警告/错误" /tmp/ci-logs/lint.log 30
              emit_log_block "### 🧪 Test 失败" /tmp/ci-logs/test.log 30
              emit_log_block "### 🏗️ Build 失败" /tmp/ci-logs/build.log 20
              emit_log_block "### 📝 Format 失败" /tmp/ci-logs/format.log 20
              echo "完整日志请查看本次 run 的 Artifacts: \`ci-error-logs\`。"
            fi
            echo ""
            echo "<!-- ci-status-comment -->"
            echo "<!-- auto-fix-retry-count: ${RETRY_COUNT} -->"
            echo 'COMMENT_EOF'
          } >> $GITHUB_OUTPUT

      - name: Create or update comment
        if: always()
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.comment.outputs.body }}
          edit-mode: replace
